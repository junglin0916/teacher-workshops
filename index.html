<script>
  async function loadWorkshops() {
    try {
      const response = await fetch("workshops.json");
      const data = await response.json();
      const container = document.getElementById("workshops");
      container.innerHTML = ""; // Clear existing placeholder content
      
      if (data.length === 0) {
        container.innerHTML = "<p>Currently no upcoming digital learning workshops found.</p>";
        return;
      }
      
      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "workshop";
        div.innerHTML = `
          <div class="title">🔹 [${item.unit}] ${item.title}</div>
          <div class="date">Date: ${item.date || "N/A"}</div>
          <div><a href="${item.link}" target="_blank">View Details ↗</a></div>
        `;
        container.appendChild(div);
      });
    } catch (e) {
      console.error("Failed to load workshops:", e);
    }
  }
  loadWorkshops();
</script>

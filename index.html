<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>數位學習精進方案 - 台中市教師研習</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #2c3e50; }
    .workshop { border-bottom: 1px solid #ccc; padding: 10px 0; }
    .date { color: #e67e22; font-weight: bold; }
    a { color: #2980b9; text-decoration: none; }
  </style>
</head>
<body>
  <h1>📚 台中市教師研習資訊</h1>
  <div id="workshops"></div>

  <script>
    async function loadWorkshops() {
      const response = await fetch("workshops.json"); // same folder
      const data = await response.json();
      const container = document.getElementById("workshops");

      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "workshop";
        div.innerHTML = `
          <div class="title">🔹 ${item.title}</div>
          <div class="date">日期：${item.date}</div>
          <div><a href="${item.link}" target="_blank">詳細資訊</a></div>
        `;
        container.appendChild(div);
      });
    }
    loadWorkshops();
  </script>
</body>
</html>

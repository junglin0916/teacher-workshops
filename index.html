<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=device-width, initial-scale=device-width">
  <title>台中市教師研習資訊</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 20px; background-color: #f5f7fa; color: #2c3e50; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; font-weight: 700; color: #1a252f; border-bottom: 3px solid #3498db; padding-bottom: 12px; margin-bottom: 20px; }
    .filter-info { background: #e8f4fd; color: #2980b9; padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; font-weight: 600; border-left: 4px solid #3498db; }
    .workshop-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: transform 0.2s, box-shadow 0.2s; }
    .workshop-card:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.05); }
    .title { font-size: 17px; font-weight: 700; color: #2c3e50; line-height: 1.4; margin-bottom: 10px; }
    .meta-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #7f8c8d; margin-bottom: 12px; }
    .badge { background: #e67e22; color: #ffffff; padding: 3px 8px; border-radius: 4px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
    .date { font-weight: 500; }
    .link-btn { display: inline-block; color: #3498db; text-decoration: none; font-weight: 600; font-size: 14px; }
    .link-btn:hover { text-decoration: underline; color: #2980b9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 台中市教師研習資訊</h1>
    <div id="filter-status" class="filter-info">正在載入最新研習資料...</div>
    <div id="workshops"></div>
  </div>

  <script>
    async function loadWorkshops() {
      const container = document.getElementById("workshops");
      const statusDiv = document.getElementById("filter-status");
      
      try {
        const response = await fetch("workshops.json");
        const data = await response.json();
        
        if (!data || data.length === 0) {
          statusDiv.innerText = "⚠️ 目前無任何更新數據，請確認後端爬蟲是否正常運作。";
          return;
        }

        // FILTER: Find only target postings with "數位學習" (or "數位" to catch variations)
        const targetKeyword = "數位學習";
        const filteredData = data.filter(item => 
          item.title.includes(targetKeyword) || item.title.includes("數位")
        );

        container.innerHTML = "";

        if (filteredData.length > 0) {
          statusDiv.innerText = `🎯 已篩選出 ${filteredData.length} 筆與「數位學習」相關的最新公告：`;
          renderItems(filteredData);
        } else {
          statusDiv.innerText = `ℹ️ 目前學校與研習中心無最新「${targetKeyword}」公告。顯示其他最新公告：`;
          // Fallback: Display the first 10 generic notices so the dashboard remains functional
          renderItems(data.slice(0, 10));
        }

      } catch (error) {
        console.error("Error parsing workshops.json:", error);
        statusDiv.innerText = "❌ 無法讀取 workshops.json 檔案。請確認 Actions 已成功執行並推播了 JSON。";
      }
    }

    function renderItems(items) {
      const container = document.getElementById("workshops");
      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "workshop-card";
        card.innerHTML = `
          <div class="title">🔹 ${item.title}</div>
          <div class="meta-row">
            <span class="badge">${item.unit}</span>
            <span class="date">發佈日期：${item.date}</span>
          </div>
          <div><a class="link-btn" href="${item.link}" target="_blank">查看詳細資訊 ↗</a></div>
        `;
        container.appendChild(card);
      });
    }

    loadWorkshops();
  </script>
</body>
</html>
